name: Progressive Xcode LLM Test Suite

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/progressive-xcode-llm-suite.yml"
  pull_request:
    paths:
      - ".github/workflows/progressive-xcode-llm-suite.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  progressive-suite:
    runs-on: macos-15
    timeout-minutes: 120

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      NSUnbufferedIO: YES

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show toolchain info
        shell: bash
        run: |
          set -euxo pipefail
          xcode-select -p
          xcodebuild -version
          swift --version
          xcrun simctl list runtimes || true
          xcrun simctl list devices || true

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-progressive-xcode-16_3-${{ hashFiles('**/Package.resolved', '**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-progressive-xcode-16_3-

      - name: Create workspace folders
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci/repos ci/results/logs ci/results/artifacts

      - name: Clone target repositories
        shell: bash
        run: |
          set -euxo pipefail

          clone_repo () {
            local url="$1"
            local ref="$2"
            local dir="$3"
            git clone --depth 1 --branch "$ref" "$url" "ci/repos/$dir"
          }

          clone_repo https://github.com/huggingface/AnyLanguageModel.git main AnyLanguageModel
          clone_repo https://github.com/ml-explore/mlx-swift-examples.git main mlx-swift-examples
          clone_repo https://github.com/bisonbet/BisonAI-iOS.git main BisonAI-iOS
          clone_repo https://github.com/ggml-org/llama.cpp.git master llama.cpp

      - name: Install optional generators
        shell: bash
        run: |
          set -euxo pipefail
          if [ -f "ci/repos/BisonAI-iOS/project.yml" ]; then
            brew install xcodegen
            xcodegen version
          fi

      - name: Discover targets and write manifest
        shell: bash
        run: |
          set -euxo pipefail
          python3 <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          root = Path("ci/repos")
          manifest = []

          def sh(cmd, cwd=None):
              p = subprocess.run(cmd, cwd=cwd, text=True, capture_output=True)
              return p.returncode, p.stdout, p.stderr

          def add_target(item):
              manifest.append(item)

          for repo in sorted(root.iterdir()):
              if not repo.is_dir():
                  continue

              pkg = repo / "Package.swift"
              projs = list(repo.rglob("*.xcodeproj"))
              workspaces = list(repo.rglob("*.xcworkspace"))
              has_project_yml = (repo / "project.yml").exists()

              if pkg.exists():
                  add_target({
                      "name": repo.name,
                      "repo_path": str(repo),
                      "kind": "swiftpm",
                      "platform": "macos",
                      "weight": 10,
                      "steps": ["resolve", "build", "test"]
                  })

              if has_project_yml:
                  add_target({
                      "name": repo.name,
                      "repo_path": str(repo),
                      "kind": "xcodegen",
                      "platform": "ios",
                      "weight": 70,
                      "steps": ["generate", "ios_build", "ios_test"]
                  })

              for p in projs:
                  add_target({
                      "name": f"{repo.name}:{p.name}",
                      "repo_path": str(repo),
                      "project_path": str(p),
                      "kind": "xcodeproj",
                      "platform": "unknown",
                      "weight": 30,
                      "steps": ["discover_schemes"]
                  })

              for w in workspaces:
                  add_target({
                      "name": f"{repo.name}:{w.name}",
                      "repo_path": str(repo),
                      "workspace_path": str(w),
                      "kind": "xcworkspace",
                      "platform": "unknown",
                      "weight": 35,
                      "steps": ["discover_schemes"]
                  })

              if repo.name == "llama.cpp":
                  add_target({
                      "name": "llama.cpp:swiftui",
                      "repo_path": str(repo),
                      "kind": "bootstrap_xcframework",
                      "platform": "ios",
                      "weight": 90,
                      "steps": ["bootstrap_xcframework", "ios_build"]
                  })

          out = Path("ci/results/manifest.json")
          out.write_text(json.dumps({"targets": sorted(manifest, key=lambda x: (x["weight"], x["name"]))}, indent=2))
          print(out.read_text())
          PY

      - name: Run progressive suite
        shell: bash
        run: |
          set -euxo pipefail
          python3 <<'PY'
          import json
    import os
          import subprocess
          import time
          from pathlib import Path

          MANIFEST = Path("ci/results/manifest.json")
          RESULTS_DIR = Path("ci/results")
          LOGS_DIR = RESULTS_DIR / "logs"
          DERIVED_ROOT = Path.home() / "Library/Developer/Xcode/DerivedData"
          STEP_SUMMARY = os.environ.get("GITHUB_STEP_SUMMARY")

          def run_cmd(cmd, cwd=None, log_path=None):
              start = time.time()
              p = subprocess.run(cmd, cwd=cwd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              output = p.stdout
              if log_path:
                  Path(log_path).write_text(output)
              return {
                  "returncode": p.returncode,
                  "seconds": round(time.time() - start, 2),
                  "output": output,
              }

          def top_lines(text, limit=8):
              interesting = []
              for line in text.splitlines():
                  low = line.lower()
                  if any(k in low for k in [
                      "error:",
                      "fatal",
                      "failed",
                      "no such module",
                      "codesign",
                      "signing",
                      "test failed",
                      "xcodebuild:",
                      "unable to",
                  ]):
                      interesting.append(line.strip())
              return interesting[:limit]

          def append_summary(md):
              if STEP_SUMMARY:
                  with open(STEP_SUMMARY, "a", encoding="utf-8") as f:
                      f.write(md)

          with MANIFEST.open() as f:
              targets = json.load(f)["targets"]

          results = []
          sim_dest = "platform=iOS Simulator,name=iPhone 16"

          for idx, target in enumerate(targets, start=1):
              name = target["name"]
              kind = target["kind"]
              repo_path = target["repo_path"]
              log_prefix = LOGS_DIR / f"{idx:02d}-{name.replace('/', '_').replace(':', '_')}"

              record = {
                  "name": name,
                  "kind": kind,
                  "status": "passed",
                  "completed_steps": [],
                  "skipped_steps": [],
                  "failed_step": None,
                  "top_issue": "",
                  "seconds": 0.0,
              }

              started = time.time()

              def fail(step, output):
                  record["status"] = "failed"
                  record["failed_step"] = step
                  keys = top_lines(output)
                  record["top_issue"] = keys[0] if keys else "Unknown failure"
                  return False

              if kind == "swiftpm":
                  r = run_cmd(["swift", "package", "resolve"], cwd=repo_path, log_path=f"{log_prefix}-resolve.log")
                  if r["returncode"] != 0:
                      fail("resolve", r["output"])
                  else:
                      record["completed_steps"].append("resolve")

                  if record["status"] == "passed":
                      r = run_cmd(["swift", "build"], cwd=repo_path, log_path=f"{log_prefix}-build.log")
                      if r["returncode"] != 0:
                          fail("build", r["output"])
                      else:
                          record["completed_steps"].append("build")

                  if record["status"] == "passed":
                      r = run_cmd(["swift", "test"], cwd=repo_path, log_path=f"{log_prefix}-test.log")
                      if r["returncode"] != 0:
                          fail("test", r["output"])
                      else:
                          record["completed_steps"].append("test")

              elif kind == "xcodegen":
                  r = run_cmd(["xcodegen", "generate"], cwd=repo_path, log_path=f"{log_prefix}-generate.log")
                  if r["returncode"] != 0:
                      fail("generate", r["output"])
                  else:
                      record["completed_steps"].append("generate")

                  if record["status"] == "passed":
                      r = run_cmd([
                          "xcodebuild",
                          "-project", "BisonAI.xcodeproj",
                          "-scheme", "BisonAI",
                          "-destination", sim_dest,
                          "-derivedDataPath", str(DERIVED_ROOT / "bisonai"),
                          "CODE_SIGNING_ALLOWED=NO",
                          "build"
                      ], cwd=repo_path, log_path=f"{log_prefix}-ios-build.log")
                      if r["returncode"] != 0:
                          fail("ios_build", r["output"])
                      else:
                          record["completed_steps"].append("ios_build")

                  if record["status"] == "passed":
                      r = run_cmd([
                          "xcodebuild",
                          "-project", "BisonAI.xcodeproj",
                          "-scheme", "BisonAI",
                          "-destination", sim_dest,
                          "-derivedDataPath", str(DERIVED_ROOT / "bisonai"),
                          "CODE_SIGNING_ALLOWED=NO",
                          "test"
                      ], cwd=repo_path, log_path=f"{log_prefix}-ios-test.log")
                      if r["returncode"] != 0:
                          fail("ios_test", r["output"])
                      else:
                          record["completed_steps"].append("ios_test")

              elif kind == "bootstrap_xcframework":
                  r = run_cmd(["./build-xcframework.sh"], cwd=repo_path, log_path=f"{log_prefix}-bootstrap.log")
                  if r["returncode"] != 0:
                      fail("bootstrap_xcframework", r["output"])
                  else:
                      record["completed_steps"].append("bootstrap_xcframework")

                  if record["status"] == "passed":
                      r = run_cmd([
                          "xcodebuild",
                          "-project", "examples/llama.swiftui/llama.swiftui.xcodeproj",
                          "-scheme", "llama.swiftui",
                          "-destination", sim_dest,
                          "-derivedDataPath", str(DERIVED_ROOT / "llama_swiftui"),
                          "CODE_SIGNING_ALLOWED=NO",
                          "build"
                      ], cwd=repo_path, log_path=f"{log_prefix}-ios-build.log")
                      if r["returncode"] != 0:
                          fail("ios_build", r["output"])
                      else:
                          record["completed_steps"].append("ios_build")

              elif kind in ("xcodeproj", "xcworkspace"):
                  scheme_list_cmd = ["xcodebuild", "-list"]
                  if kind == "xcodeproj":
                      scheme_list_cmd += ["-project", target["project_path"]]
                  else:
                      scheme_list_cmd += ["-workspace", target["workspace_path"]]

                  r = run_cmd(scheme_list_cmd, cwd=repo_path, log_path=f"{log_prefix}-discover-schemes.log")
                  if r["returncode"] != 0:
                      fail("discover_schemes", r["output"])
                  else:
                      record["completed_steps"].append("discover_schemes")

              record["seconds"] = round(time.time() - started, 2)
              results.append(record)

          summary = []
          summary.append("# Progressive Xcode LLM Test Summary")
          summary.append("")
          summary.append("| Target | Kind | Status | Failed step | Completed steps | Seconds | Top issue |")
          summary.append("|---|---|---|---|---|---:|---|")

          failures = 0
          for r in results:
              if r["status"] != "passed":
                  failures += 1
              summary.append(
                  f"| {r['name']} | {r['kind']} | {r['status']} | {r['failed_step'] or ''} | {', '.join(r['completed_steps'])} | {r['seconds']:.2f} | {r['top_issue'].replace('|', '/')} |"
              )

          summary_text = "\n".join(summary) + "\n"
          (RESULTS_DIR / "summary.json").write_text(json.dumps(results, indent=2))
          (RESULTS_DIR / "summary.md").write_text(summary_text)
          append_summary(summary_text)

          raise SystemExit(1 if failures else 0)
          PY

      - name: Upload suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progressive-xcode-llm-results
          path: ci/results
          if-no-files-found: ignore
