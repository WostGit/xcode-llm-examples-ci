name: Xcode LLM 6h Exhaustive CI

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/xcode-llm-6h-exhaustive.yml"
  pull_request:
    paths:
      - ".github/workflows/xcode-llm-6h-exhaustive.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover:
    name: Discover repos, schemes, and destinations
    runs-on: macos-15
    timeout-minutes: 45
    outputs:
      manifest_json: ${{ steps.emit.outputs.manifest_json }}
      matrix_json: ${{ steps.emit.outputs.matrix_json }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      NSUnbufferedIO: YES
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode-llm-6h-${{ hashFiles('**/Package.resolved', '**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-xcode-llm-6h-

      - name: Prepare workspace
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci/repos ci/out ci/logs

      - name: Show toolchain
        shell: bash
        run: |
          set -euxo pipefail
          echo "::group::toolchain"
          xcode-select -p
          xcodebuild -version
          swift --version
          echo "::endgroup::"

          echo "::group::sim runtimes"
          xcrun simctl list runtimes || true
          echo "::endgroup::"

          echo "::group::sim devices"
          xcrun simctl list devices available || true
          echo "::endgroup::"

      - name: Clone target repos
        shell: bash
        run: |
          set -euxo pipefail

          clone_repo () {
            local url="$1"
            local ref="$2"
            local dir="$3"
            git clone --depth 1 --branch "$ref" "$url" "ci/repos/$dir"
          }

          clone_repo https://github.com/huggingface/AnyLanguageModel.git main AnyLanguageModel
          clone_repo https://github.com/ml-explore/mlx-swift-examples.git main mlx-swift-examples
          clone_repo https://github.com/bisonbet/BisonAI-iOS.git main BisonAI-iOS
          clone_repo https://github.com/ggml-org/llama.cpp.git master llama.cpp

      - name: Install optional tools
        shell: bash
        run: |
          set -euxo pipefail
          brew install xcodegen || true
          xcodegen version || true

      - name: Discover targets and destinations
        id: emit
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          root = Path("ci/repos")
          out_dir = Path("ci/out")
          out_dir.mkdir(parents=True, exist_ok=True)

          def sh(cmd, cwd=None):
              p = subprocess.run(cmd, cwd=cwd, text=True, capture_output=True)
              return p.returncode, p.stdout, p.stderr

          def parse_destinations(text):
              items = []
              current_section = None
              for raw in text.splitlines():
                  line = raw.rstrip()
                  if "Available destinations for the" in line:
                      current_section = "available"
                      continue
                  if "Ineligible destinations for the" in line:
                      current_section = "ineligible"
                      continue
                  s = line.strip()
                  if not s.startswith("{") or not s.endswith("}"):
                      continue
                  body = s[1:-1]
                  pairs = {}
                  for part in body.split(", "):
                      if ":" in part:
                          k, v = part.split(":", 1)
                          pairs[k.strip()] = v.strip()
                  pairs["_section"] = current_section
                  items.append(pairs)
              return items

          targets = []

          # AnyLanguageModel: SwiftPM
          repo = root / "AnyLanguageModel"
          if (repo / "Package.swift").exists():
              targets.append({
                  "name": "AnyLanguageModel",
                  "repo_path": str(repo),
                  "kind": "swiftpm",
                  "weight": 10,
                  "steps": ["resolve", "build", "test", "traits_coreml", "traits_mlx", "traits_llama"],
              })

          # mlx-swift-examples: explicit schemes
          repo = root / "mlx-swift-examples"
          proj = repo / "mlx-swift-examples.xcodeproj"
          if proj.exists():
              for idx, scheme in enumerate(["LLMBasic", "LLMEval", "MLXChatExample"], start=20):
                  rc, out, err = sh(
                      ["xcodebuild", "-project", str(proj.name), "-scheme", scheme, "-showdestinations"],
                      cwd=repo
                  )
                  dests = parse_destinations(out + "\n" + err)
                  targets.append({
                      "name": f"mlx-swift-examples :: {scheme}",
                      "repo_path": str(repo),
                      "kind": "xcode_scheme",
                      "project": proj.name,
                      "scheme": scheme,
                      "destinations": dests,
                      "weight": idx,
                      "steps": ["showdestinations", "build_eligible"],
                  })

          # BisonAI: generate then inspect
          repo = root / "BisonAI-iOS"
          if (repo / "project.yml").exists():
              sh(["xcodegen", "generate"], cwd=repo)
              proj = repo / "BisonAI.xcodeproj"
              dests = []
              if proj.exists():
                  rc, out, err = sh(
                      ["xcodebuild", "-project", proj.name, "-scheme", "BisonAI", "-showdestinations"],
                      cwd=repo
                  )
                  dests = parse_destinations(out + "\n" + err)
              targets.append({
                  "name": "BisonAI-iOS",
                  "repo_path": str(repo),
                  "kind": "bisonai_xcodegen",
                  "project": "BisonAI.xcodeproj",
                  "scheme": "BisonAI",
                  "destinations": dests,
                  "weight": 70,
                  "steps": ["generate", "showdestinations", "build_eligible", "test_eligible"],
              })

          # llama.cpp heavy
          repo = root / "llama.cpp"
          swiftui_proj = repo / "examples" / "llama.swiftui" / "llama.swiftui.xcodeproj"
          targets.append({
              "name": "llama.cpp :: bootstrap_xcframework",
              "repo_path": str(repo),
              "kind": "llama_bootstrap",
              "weight": 90,
              "steps": ["bootstrap_xcframework"],
          })
          if swiftui_proj.exists():
              rc, out, err = sh(
                  ["xcodebuild", "-project", str(swiftui_proj.relative_to(repo)), "-scheme", "llama.swiftui", "-showdestinations"],
                  cwd=repo
              )
              dests = parse_destinations(out + "\n" + err)
              targets.append({
                  "name": "llama.cpp :: llama.swiftui",
                  "repo_path": str(repo),
                  "kind": "llama_swiftui",
                  "project": str(swiftui_proj.relative_to(repo)),
                  "scheme": "llama.swiftui",
                  "destinations": dests,
                  "weight": 100,
                  "steps": ["showdestinations", "build_eligible"],
              })

          targets = sorted(targets, key=lambda x: (x["weight"], x["name"]))

          manifest = {"targets": targets}
          (out_dir / "manifest.json").write_text(json.dumps(manifest, indent=2), encoding="utf-8")

          # execution matrix: one row per target, build logic determines destination loops internally
          matrix = {
              "include": [
                  {
                      "name": t["name"],
                      "repo_path": t["repo_path"],
                      "kind": t["kind"],
                  }
                  for t in targets
              ]
          }
          (out_dir / "matrix.json").write_text(json.dumps(matrix, indent=2), encoding="utf-8")

          print("::group::manifest.json")
          print((out_dir / "manifest.json").read_text(encoding="utf-8"))
          print("::endgroup::")
          print("::group::matrix.json")
          print((out_dir / "matrix.json").read_text(encoding="utf-8"))
          print("::endgroup::")

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as f:
              f.write("manifest_json<<EOF\n")
              f.write((out_dir / "manifest.json").read_text(encoding="utf-8"))
              f.write("\nEOF\n")
              f.write("matrix_json<<EOF\n")
              f.write((out_dir / "matrix.json").read_text(encoding="utf-8"))
              f.write("\nEOF\n")
          PY

      - name: Upload discovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-artifacts
          path: ci/out
          if-no-files-found: ignore

  lane-smoke:
    name: Smoke / SwiftPM / Fast confidence
    needs: discover
    runs-on: macos-15
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      NSUnbufferedIO: YES
    steps:
      - uses: actions/checkout@v4

      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode-llm-6h-smoke-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-llm-6h-smoke-
            ${{ runner.os }}-xcode-llm-6h-

      - name: Prepare
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci/repos ci/results/logs

      - name: Clone AnyLanguageModel
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch main https://github.com/huggingface/AnyLanguageModel.git ci/repos/AnyLanguageModel

      - name: Run AnyLanguageModel exhaustive SwiftPM lane
        shell: bash
        run: |
          set -euxo pipefail
          cd ci/repos/AnyLanguageModel

          echo "::group::swift package resolve"
          swift package resolve 2>&1 | tee ../../results/logs/01-resolve.log
          echo "::endgroup::"

          echo "::group::swift build"
          swift build 2>&1 | tee ../../results/logs/02-build.log
          echo "::endgroup::"

          echo "::group::swift test"
          swift test 2>&1 | tee ../../results/logs/03-test.log
          echo "::endgroup::"

          echo "::group::swift build --traits CoreML"
          swift build --traits CoreML 2>&1 | tee ../../results/logs/04-build-coreml.log
          echo "::endgroup::"

          echo "::group::swift build --traits MLX"
          swift build --traits MLX 2>&1 | tee ../../results/logs/05-build-mlx.log
          echo "::endgroup::"

          echo "::group::swift build --traits Llama"
          swift build --traits Llama 2>&1 | tee ../../results/logs/06-build-llama.log
          echo "::endgroup::"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: ci/results
          if-no-files-found: ignore

  lane-xcode:
    name: Xcode examples / scheme-aware builds
    needs: discover
    runs-on: macos-15
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - repo: mlx-swift-examples
            clone_url: https://github.com/ml-explore/mlx-swift-examples.git
            ref: main
            kind: mlx
          - repo: BisonAI-iOS
            clone_url: https://github.com/bisonbet/BisonAI-iOS.git
            ref: main
            kind: bison
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      NSUnbufferedIO: YES
    steps:
      - uses: actions/checkout@v4

      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode-llm-6h-xcode-${{ matrix.repo }}
          restore-keys: |
            ${{ runner.os }}-xcode-llm-6h-xcode-
            ${{ runner.os }}-xcode-llm-6h-

      - name: Prepare
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci/repos ci/results/logs

      - name: Clone target repo
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "${{ matrix.ref }}" "${{ matrix.clone_url }}" "ci/repos/${{ matrix.repo }}"

      - name: Install xcodegen for BisonAI
        if: matrix.kind == 'bison'
        shell: bash
        run: |
          set -euxo pipefail
          brew install xcodegen || true
          xcodegen version

      - name: Run scheme-aware build plan
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          import subprocess
          from pathlib import Path

          repo_kind = "${{ matrix.kind }}"
          repo_name = "${{ matrix.repo }}"
          repo = Path("ci/repos") / repo_name
          out = Path("ci/results")
          logs = out / "logs"
          out.mkdir(parents=True, exist_ok=True)
          logs.mkdir(parents=True, exist_ok=True)

          def run(name, cmd, cwd):
              print("=" * 100, flush=True)
              print(f"[STEP] {name}", flush=True)
              print("COMMAND:", " ".join(cmd), flush=True)
              print("CWD:", cwd, flush=True)
              print("=" * 100, flush=True)
              p = subprocess.Popen(cmd, cwd=cwd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, bufsize=1)
              log_path = logs / f"{name}.log"
              with open(log_path, "w", encoding="utf-8") as f:
                  assert p.stdout is not None
                  for line in p.stdout:
                      print(line, end="", flush=True)
                      f.write(line)
              rc = p.wait()
              print(f"[RESULT] {name} rc={rc}", flush=True)
              return rc

          def capture(cmd, cwd):
              p = subprocess.run(cmd, cwd=cwd, text=True, capture_output=True)
              return p.returncode, p.stdout + "\n" + p.stderr

          def parse_destinations(text):
              items = []
              current = None
              for raw in text.splitlines():
                  line = raw.rstrip()
                  if "Available destinations for the" in line:
                      current = "available"
                      continue
                  if "Ineligible destinations for the" in line:
                      current = "ineligible"
                      continue
                  s = line.strip()
                  if not (s.startswith("{") and s.endswith("}")):
                      continue
                  body = s[1:-1]
                  fields = {}
                  for part in body.split(", "):
                      if ":" in part:
                          k, v = part.split(":", 1)
                          fields[k.strip()] = v.strip()
                  fields["_section"] = current
                  items.append(fields)
              return items

          def build_scheme(project, scheme):
              rc, txt = capture(["xcodebuild", "-project", project, "-scheme", scheme, "-showdestinations"], repo)
              print(txt, flush=True)
              dests = parse_destinations(txt)

              available = [d for d in dests if d.get("_section") == "available"]

              # prefer macOS first, then iOS simulator, then visionOS simulator
              selected = []
              seen = set()
              for d in available:
                  plat = d.get("platform", "")
                  name = d.get("name", "")
                  osver = d.get("OS", "latest")
                  if plat == "macOS":
                      spec = "platform=macOS"
                  elif plat == "iOS Simulator":
                      spec = f"platform=iOS Simulator,name={name}"
                      if osver and osver != "latest":
                          spec += f",OS={osver}"
                  elif plat == "visionOS Simulator":
                      spec = f"platform=visionOS Simulator,name={name}"
                      if osver and osver != "latest":
                          spec += f",OS={osver}"
                  else:
                      continue
                  if spec not in seen:
                      seen.add(spec)
                      selected.append(spec)

              results = []
              for idx, dest in enumerate(selected[:4], start=1):
                  step_name = f"{scheme}-build-{idx}"
                  rc = run(
                      step_name,
                      [
                          "xcodebuild",
                          "-project", project,
                          "-scheme", scheme,
                          "-destination", dest,
                          "-derivedDataPath", "DerivedData",
                          "CODE_SIGNING_ALLOWED=NO",
                          "build",
                      ],
                      repo
                  )
                  results.append({"destination": dest, "rc": rc})

              return results

          summary = []

          if repo_kind == "mlx":
              project = "mlx-swift-examples.xcodeproj"
              for scheme in ["LLMBasic", "LLMEval", "MLXChatExample"]:
                  summary.append({
                      "scheme": scheme,
                      "results": build_scheme(project, scheme),
                  })

          elif repo_kind == "bison":
              run("xcodegen-generate", ["xcodegen", "generate"], repo)
              summary.append({
                  "scheme": "BisonAI",
                  "results": build_scheme("BisonAI.xcodeproj", "BisonAI"),
              })

          (out / f"{repo_name}-summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          print(json.dumps(summary, indent=2), flush=True)
          PY

      - name: Upload xcode lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-results-${{ matrix.repo }}
          path: ci/results
          if-no-files-found: ignore

  lane-heavy-llama:
    name: Heavy native backend / llama.cpp
    needs: discover
    runs-on: macos-15
    timeout-minutes: 240
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      NSUnbufferedIO: YES
    steps:
      - uses: actions/checkout@v4

      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode-llm-6h-llama
          restore-keys: |
            ${{ runner.os }}-xcode-llm-6h-llama
            ${{ runner.os }}-xcode-llm-6h-

      - name: Prepare
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci/repos ci/results/logs

      - name: Clone llama.cpp
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch master https://github.com/ggml-org/llama.cpp.git ci/repos/llama.cpp

      - name: Build XCFramework and scheme-aware app build
        shell: bash
        run: |
          set -euxo pipefail

          python3 <<'PY'
          import json
          import subprocess
          from pathlib import Path

          repo = Path("ci/repos/llama.cpp")
          out = Path("ci/results")
          logs = out / "logs"
          out.mkdir(parents=True, exist_ok=True)
          logs.mkdir(parents=True, exist_ok=True)

          def run(name, cmd, cwd):
              print("=" * 120, flush=True)
              print(f"[STEP] {name}", flush=True)
              print("COMMAND:", " ".join(cmd), flush=True)
              print("CWD:", cwd, flush=True)
              print("=" * 120, flush=True)
              p = subprocess.Popen(cmd, cwd=cwd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True, bufsize=1)
              log_path = logs / f"{name}.log"
              with open(log_path, "w", encoding="utf-8") as f:
                  assert p.stdout is not None
                  for line in p.stdout:
                      print(line, end="", flush=True)
                      f.write(line)
              rc = p.wait()
              print(f"[RESULT] {name} rc={rc}", flush=True)
              return rc

          def capture(cmd, cwd):
              p = subprocess.run(cmd, cwd=cwd, text=True, capture_output=True)
              return p.returncode, p.stdout + "\n" + p.stderr

          def parse_destinations(text):
              items = []
              current = None
              for raw in text.splitlines():
                  line = raw.rstrip()
                  if "Available destinations for the" in line:
                      current = "available"
                      continue
                  if "Ineligible destinations for the" in line:
                      current = "ineligible"
                      continue
                  s = line.strip()
                  if not (s.startswith("{") and s.endswith("}")):
                      continue
                  body = s[1:-1]
                  fields = {}
                  for part in body.split(", "):
                      if ":" in part:
                          k, v = part.split(":", 1)
                          fields[k.strip()] = v.strip()
                  fields["_section"] = current
                  items.append(fields)
              return items

          summary = {"bootstrap": None, "app_builds": []}

          rc = run("llama-bootstrap-xcframework", ["./build-xcframework.sh"], repo)
          summary["bootstrap"] = {"rc": rc, "xcframework_exists": (repo / "build-apple" / "llama.xcframework").exists()}

          if rc == 0:
              project = "examples/llama.swiftui/llama.swiftui.xcodeproj"
              scheme = "llama.swiftui"
              _, txt = capture(["xcodebuild", "-project", project, "-scheme", scheme, "-showdestinations"], repo)
              print(txt, flush=True)
              dests = parse_destinations(txt)

              selected = []
              seen = set()
              for d in dests:
                  if d.get("_section") != "available":
                      continue
                  plat = d.get("platform", "")
                  name = d.get("name", "")
                  osver = d.get("OS", "latest")
                  if plat == "iOS Simulator":
                      spec = f"platform=iOS Simulator,name={name}"
                      if osver and osver != "latest":
                          spec += f",OS={osver}"
                  elif plat == "visionOS Simulator":
                      spec = f"platform=visionOS Simulator,name={name}"
                      if osver and osver != "latest":
                          spec += f",OS={osver}"
                  elif plat == "macOS":
                      spec = "platform=macOS"
                  else:
                      continue
                  if spec not in seen:
                      seen.add(spec)
                      selected.append(spec)

              for idx, dest in enumerate(selected[:4], start=1):
                  rc2 = run(
                      f"llama-swiftui-build-{idx}",
                      [
                          "xcodebuild",
                          "-project", project,
                          "-scheme", scheme,
                          "-destination", dest,
                          "-derivedDataPath", "DerivedData",
                          "CODE_SIGNING_ALLOWED=NO",
                          "build",
                      ],
                      repo
                  )
                  summary["app_builds"].append({"destination": dest, "rc": rc2})

          (out / "llama-summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          print(json.dumps(summary, indent=2), flush=True)
          PY

      - name: Upload heavy lane artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-llama-results
          path: ci/results
          if-no-files-found: ignore

  lane-repeatability:
    name: Warm cache repeatability pass
    needs:
      - lane-smoke
      - lane-xcode
    runs-on: macos-15
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
      NSUnbufferedIO: YES
    steps:
      - uses: actions/checkout@v4

      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode-llm-6h-repeatability
          restore-keys: |
            ${{ runner.os }}-xcode-llm-6h-repeatability
            ${{ runner.os }}-xcode-llm-6h-

      - name: Prepare
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ci/repos ci/results/logs

      - name: Clone repos
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch main https://github.com/huggingface/AnyLanguageModel.git ci/repos/AnyLanguageModel
          git clone --depth 1 --branch main https://github.com/ml-explore/mlx-swift-examples.git ci/repos/mlx-swift-examples

      - name: Warm cache rebuild
        shell: bash
        run: |
          set -euxo pipefail

          echo "::group::AnyLanguageModel warm build"
          cd ci/repos/AnyLanguageModel
          swift build 2>&1 | tee ../../results/logs/repeat-anylm-build.log
          swift test 2>&1 | tee ../../results/logs/repeat-anylm-test.log
          cd ../../
          echo "::endgroup::"

          echo "::group::mlx-swift-examples warm build"
          cd ci/repos/mlx-swift-examples
          xcodebuild -project mlx-swift-examples.xcodeproj -scheme LLMBasic -destination platform=macOS -derivedDataPath DerivedData CODE_SIGNING_ALLOWED=NO build 2>&1 | tee ../../results/logs/repeat-mlx-llmbasic.log || true
          xcodebuild -project mlx-swift-examples.xcodeproj -scheme LLMEval -destination platform=macOS -derivedDataPath DerivedData CODE_SIGNING_ALLOWED=NO build 2>&1 | tee ../../results/logs/repeat-mlx-llmeval.log || true
          echo "::endgroup::"

      - name: Upload repeatability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repeatability-results
          path: ci/results
          if-no-files-found: ignore

  summary:
    name: Final summary
    if: always()
    needs:
      - discover
      - lane-smoke
      - lane-xcode
      - lane-heavy-llama
      - lane-repeatability
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build final markdown summary
        shell: bash
        run: |
          set -euxo pipefail

          echo "# Xcode LLM 6h Exhaustive CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts downloaded under \`artifacts/\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "## Artifact tree" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          find artifacts -maxdepth 3 -type f | sort >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "::group::artifact tree"
          find artifacts -maxdepth 4 -type f | sort
          echo "::endgroup::"

          echo "::group::json summaries"
          find artifacts -type f \( -name '*.json' -o -name '*.md' \) | sort | while read -r f; do
            echo "===== $f ====="
            cat "$f" || true
            echo
          done
          echo "::endgroup::"
